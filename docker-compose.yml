services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mvc-app
    ports:
      - "5163:5163"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:5163
      - ConnectionStrings__DefaultConnection=Server=database;Database=EcommerceDb;User Id=sa;Password=YourStrong@Password123;TrustServerCertificate=True
    depends_on:
      database:
        condition: service_healthy
    networks:
      - proj-net

  database:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: mssql-db
    ports:
      - "1433:1433"
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=YourStrong@Password123
    volumes:
      - mssql-data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'YourStrong@Password123' -Q 'SELECT 1' -C"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - proj-net

volumes:
  mssql-data:

networks:
  proj-net:
    driver: bridge
